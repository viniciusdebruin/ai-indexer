name: Build Smoke

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install -U pip build twine
      - name: Build package
        run: python -m build
      - name: Smoke install
        run: python -m pip install dist/*.whl && ai-indexer --version
